server:
  port: 9090

spring:
  application:
    name: api-gateway

  main:
    web-application-type: reactive

  cloud:
    gateway:

      # ✅ CORS CONFIG (MAIN FIX)
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://3.110.167.15:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

      # ✅ ROUTES
      routes:
        - id: user-service
          uri: http://3.110.167.15:8080
          predicates:
            - Path=/auth/**,/users/**

        - id: question-service
          uri: http://3.110.167.15:8082
          predicates:
            - Path=/questions/**

        - id: answer-service
          uri: http://3.110.167.15:8083
          predicates:
            - Path=/answers/**

        - id: notes-service
          uri: http://3.110.167.15:8084
          predicates:
            - Path=/notes/**