server:
  port: 9090

spring:
  application:
    name: api-gateway

  main:
    web-application-type: reactive

  cloud:
    gateway:

      # ✅ GLOBAL CORS CONFIG (CORRECT)
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://3.110.167.15:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

      # ✅ ROUTES (FIXED)
      routes:

        # 🔥 USER SERVICE (FIXED)
        - id: user-service-auth
          uri: http://3.110.167.15:8080
          predicates:
            - Path=/auth/**

        - id: user-service-users
          uri: http://3.110.167.15:8080
          predicates:
            - Path=/users/**

        # 🔥 QUESTION SERVICE
        - id: question-service
          uri: http://3.110.167.15:8082
          predicates:
            - Path=/questions/**

        # 🔥 ANSWER SERVICE
        - id: answer-service
          uri: http://3.110.167.15:8083
          predicates:
            - Path=/answers/**

        # 🔥 NOTES SERVICE
        - id: notes-service
          uri: http://3.110.167.15:8084
          predicates:
            - Path=/notes/**