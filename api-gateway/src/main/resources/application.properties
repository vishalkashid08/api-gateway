# =========================
# APP CONFIG
# =========================
spring.application.name=api-gateway
server.port=9090
spring.main.web-application-type=reactive

# =========================
# ROUTES
# =========================

# USER + AUTH SERVICE
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=http://3.110.167.15:8080
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**,/users/**

# QUESTION SERVICE
spring.cloud.gateway.routes[1].id=question-service
spring.cloud.gateway.routes[1].uri=http://3.110.167.15:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/questions/**

# ANSWER SERVICE
spring.cloud.gateway.routes[2].id=answer-service
spring.cloud.gateway.routes[2].uri=http://3.110.167.15:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/answers/**

# NOTES SERVICE
spring.cloud.gateway.routes[3].id=notes-service
spring.cloud.gateway.routes[3].uri=http://3.110.167.15:8084
spring.cloud.gateway.routes[3].predicates[0]=Path=/notes/**

# =========================
# 🔥 GLOBAL CORS FIX (IMPORTANT)
# =========================

spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://3.110.167.15:5173
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true